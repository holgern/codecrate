[codecrate]
output = "context_codecrate.md"
keep_docstrings = true
dedupe = true
respect_gitignore = true
exclude = ["*/tests/*", "*/migrations/*", "*/.venv/*", "*/todo.md"]
include = ["**/*.py", "**/*.toml", "**/*.rst", "**/*.md", "**/*.typed"]
split_max_chars = 0
manifest = true
layout = "full"
profile = "portable-agent"
emit_standalone_unpacker = true
# index_json_mode = "compact"
